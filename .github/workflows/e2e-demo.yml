name: E2E Demo Recording

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      DEMO_SESSION_SEED: "true"
      DATABASE_URL: sqlite:///./r4mi.db

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Start backend
        working-directory: backend
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 > /tmp/backend.log 2>&1 &
          echo "Backend PID: $!"
        env:
          GEMINI_API_KEY: ${{ env.GEMINI_API_KEY }}
          DEMO_SESSION_SEED: "true"

      - name: Verify backend is starting
        run: |
          sleep 5
          echo "=== Backend log (first 50 lines) ==="
          head -50 /tmp/backend.log || echo "No log file found"
          echo "=== Checking port 8000 ==="
          curl -s http://localhost:8000/health || echo "Health endpoint not responding yet"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Serve frontend
        run: npx serve -s frontend/dist -p 3000 &

      - name: Wait for servers
        run: |
          npx wait-on http://localhost:8000/health http://localhost:3000 --timeout 90000

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test demo health
        env:
          PWSLOWMO: "800"

      - name: Upload test recordings
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: demo-recordings-${{ github.run_number }}
          path: e2e/test-results/
          retention-days: 7

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: e2e/playwright-report/
          retention-days: 7

      - name: Dump backend logs on failure
        if: failure()
        run: |
          echo "=== Full backend log ==="
          cat /tmp/backend.log || echo "No backend log found"
