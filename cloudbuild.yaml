# cloudbuild.yaml — Automated deployment to Google Cloud Run
#
# Required substitutions (set in Cloud Build trigger or pass with --substitutions):
#   _PROJECT      — GCP project ID (e.g. r4mi-ai-demo)
#   _REGION       — Cloud Run region (e.g. us-central1)
#   _BACKEND_URL  — Cloud Run URL of the backend service (from first manual deploy)
#
# Trigger manually:
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_PROJECT=r4mi-ai-demo,_REGION=us-central1,_BACKEND_URL=https://r4mi-backend-xxxxxxxxxx-uc.a.run.app
#
# See DEPLOY.md for first-time setup (Artifact Registry, secrets, IAM).

substitutions:
  _PROJECT: r4mi-ai-demo
  _REGION: us-central1
  _BACKEND_URL: ""  # must be provided — set in trigger substitution variables

steps:
  # ── Backend: build ────────────────────────────────────────────────────────
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT}/r4mi-ai/backend:${COMMIT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT}/r4mi-ai/backend:latest
      - ./backend

  # ── Frontend: build (parallel with backend build) ─────────────────────────
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT}/r4mi-ai/frontend:${COMMIT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT}/r4mi-ai/frontend:latest
      - ./frontend
    waitFor: ["-"]  # start immediately, parallel with backend build

  # ── Backend: push ─────────────────────────────────────────────────────────
  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${_PROJECT}/r4mi-ai/backend
    waitFor: [build-backend]

  # ── Frontend: push ────────────────────────────────────────────────────────
  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${_PROJECT}/r4mi-ai/frontend
    waitFor: [build-frontend]

  # ── Backend: deploy to Cloud Run ──────────────────────────────────────────
  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - r4mi-backend
      - --image=${_REGION}-docker.pkg.dev/${_PROJECT}/r4mi-ai/backend:${COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8000
      - --timeout=3600
      - --min-instances=1
      - --set-secrets=GEMINI_API_KEY=gemini-api-key:latest
      - --set-env-vars=GOOGLE_GENAI_USE_VERTEXAI=false,DATABASE_URL=sqlite:////tmp/r4mi.db,PATTERN_THRESHOLD=3,PATTERN_CONFIDENCE_MIN=0.85,AGENTVERSE_MATCH_THRESHOLD=0.85,DEMO_USER_ID=permit-tech-001,DEMO_SESSION_SEED=true,VISION_CACHE_TTL=300
    waitFor: [push-backend]

  # ── Frontend: deploy to Cloud Run ─────────────────────────────────────────
  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - r4mi-frontend
      - --image=${_REGION}-docker.pkg.dev/${_PROJECT}/r4mi-ai/frontend:${COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --timeout=3600
      - --min-instances=1
      - --set-env-vars=BACKEND_URL=${_BACKEND_URL}
    waitFor: [push-frontend, deploy-backend]

images:
  - ${_REGION}-docker.pkg.dev/${_PROJECT}/r4mi-ai/backend:${COMMIT_SHA}
  - ${_REGION}-docker.pkg.dev/${_PROJECT}/r4mi-ai/backend:latest
  - ${_REGION}-docker.pkg.dev/${_PROJECT}/r4mi-ai/frontend:${COMMIT_SHA}
  - ${_REGION}-docker.pkg.dev/${_PROJECT}/r4mi-ai/frontend:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
