services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/seed:/app/seed
      - r4mi_db:/app/data
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:////app/data/r4mi.db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  r4mi_db:
